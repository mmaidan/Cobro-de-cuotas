<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gestión de Cuotas — Escuela</title>

<!-- PWA: permite "Agregar a pantalla de inicio" en Android/iOS y que la app
     abra a pantalla completa, como una app nativa. -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e293f">
<meta name="background-color" content="#f8f4ec">
<link rel="icon" href="icons/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cuotas ISJ">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<!-- SDK "compat" de Firebase: expone el objeto global `firebase`, así el resto del código
     puede seguir siendo JS plano sin necesidad de módulos ES ni build step. -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  /* Paleta derivada del escudo del Instituto San José:
     azul del panel -> acciones principales · dorado de la antorcha -> mora en curso
     verde de las hojas -> al día · rojo del borde -> mora vencida / alertas */
  :root{
    --bg:#f8f4ec; --panel:#ffffff; --ink:#332b22; --muted:#8a8073;
    --sidebar:#1e293f; --sidebar-ink:#c7d0e3;
    --accent:#5b7da6; --accent-dark:#46658a;
    --warn:#c98f35; --danger:#bb5847; --ok:#6b9a63; --border:#e8e0d0;
  }
  *{font-family:'Inter',sans-serif;}
  h1,h2,h3,.font-display{font-family:'Sora',sans-serif;}
  body{background:var(--bg); color:var(--ink);}
  .sidebar{background:var(--sidebar); color:var(--sidebar-ink);}
  .nav-item{transition:all .15s ease;}
  .nav-item:hover{background:rgba(255,255,255,.06); color:#fff;}
  .nav-item.active{background:var(--accent); color:#fff;}
  .card{background:var(--panel); border:1px solid var(--border); border-radius:14px;}
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-primary:hover{background:var(--accent-dark);}
  .badge-ok{background:#e6f0e4; color:var(--ok);}
  .badge-warn{background:#faf0dd; color:var(--warn);}
  .badge-danger{background:#fae5e1; color:var(--danger);}
  .badge-muted{background:#f1eee6; color:var(--muted);}
  table.tbl th{font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); font-weight:600;}
  table.tbl td, table.tbl th{padding:10px 14px; border-bottom:1px solid var(--border);}
  table.tbl tr:hover td{background:#faf8f3;}
  .modal-bg{background:rgba(30,41,63,.55);}
  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-thumb{background:#d8cfbe; border-radius:8px;}
  input[type=text], input[type=number], input[type=date], input[type=month], input[type=password], select{
    border:1px solid var(--border); border-radius:8px; padding:8px 10px; width:100%; font-size:14px;
  }
  input:focus, select:focus{outline:2px solid var(--accent); outline-offset:1px; border-color:transparent;}
  label.lbl{font-size:12px; font-weight:600; color:var(--muted); display:block; margin-bottom:4px;}
  .logo-img{width:40px; height:44px; object-fit:contain; border-radius:8px; background:#fff; padding:3px;}
  .safe-top{padding-top:env(safe-area-inset-top);}
  .safe-bottom{padding-bottom:env(safe-area-inset-bottom);}
  @media (max-width:767px){
    table.tbl{font-size:12px;}
    table.tbl td, table.tbl th{padding:8px 10px;}
  }
</style>
</head>
<body class="h-screen w-screen overflow-hidden">
<div id="app" class="h-full w-full"></div>
<script src="config.js"></script>
<script src="logo.js"></script>
<script src="app.js"></script>
<script>
  // Registro del service worker (necesario para que la app sea instalable).
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {
        // Si falla (ej. abierto como file:// en vez de https://), la app sigue
        // funcionando normal, solo sin la opción de instalar.
      });
    });
  }
</script>
</body>
</html>
