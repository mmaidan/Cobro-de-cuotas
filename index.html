<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gestión de Cuotas — Escuela</title>

<!-- PWA: permite "Agregar a pantalla de inicio" en Android/iOS y que la app
     abra a pantalla completa, como una app nativa. -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2a1f1c">
<meta name="background-color" content="#f8f4ec">
<link rel="icon" href="icons/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cuotas ISJ">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<!-- SDK "compat" de Firebase: expone el objeto global `firebase`, así el resto del código
     puede seguir siendo JS plano sin necesidad de módulos ES ni build step. -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  /* Paleta derivada del escudo del Instituto San José:
     rojo del borde -> acciones principales y mora vencida (tonos distintos)
     dorado de la antorcha -> mora en curso · verde de las hojas -> al día */
  :root{
    --bg:#f8f4ec; --panel:#ffffff; --ink:#332b22; --muted:#8a8073;
    --sidebar:#2a1f1c; --sidebar-2:#1f1714; --sidebar-ink:#e3d3ca;
    --accent:#a1483a; --accent-dark:#833a2f;
    --warn:#c98f35; --danger:#c1392b; --ok:#6b9a63; --border:#e8e0d0;
    --shadow-sm:0 1px 2px rgba(43,32,22,.06);
    --shadow-md:0 6px 20px -6px rgba(43,32,22,.14), 0 2px 6px -2px rgba(43,32,22,.08);
    --shadow-lg:0 20px 45px -12px rgba(43,32,22,.28);
  }
  *{font-family:'Inter',sans-serif;}
  h1,h2,h3,.font-display{font-family:'Sora',sans-serif; letter-spacing:-0.01em;}
  body{background:var(--bg); color:var(--ink);}
  .sidebar{background:linear-gradient(180deg, var(--sidebar) 0%, var(--sidebar-2) 100%); color:var(--sidebar-ink);}
  .nav-item{transition:background .15s ease, color .15s ease, transform .1s ease; position:relative;}
  .nav-item:hover{background:rgba(255,255,255,.07); color:#fff;}
  .nav-item.active{background:var(--accent); color:#fff; box-shadow:var(--shadow-sm);}
  .card{background:var(--panel); border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow-sm); transition:box-shadow .2s ease, transform .2s ease;}
  .btn-primary{background:var(--accent); color:#fff; box-shadow:0 1px 2px rgba(161,72,58,.3); transition:background .15s ease, box-shadow .15s ease, transform .1s ease;}
  .btn-primary:hover{background:var(--accent-dark); box-shadow:0 6px 16px -4px rgba(161,72,58,.45); transform:translateY(-1px);}
  .btn-primary:active{transform:translateY(0);}
  .badge-ok{background:#e6f0e4; color:var(--ok);}
  .badge-warn{background:#faf0dd; color:var(--warn);}
  .badge-danger{background:#fae5e1; color:var(--danger);}
  .badge-muted{background:#f1eee6; color:var(--muted);}
  table.tbl th{font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-weight:700;}
  table.tbl td, table.tbl th{padding:11px 14px; border-bottom:1px solid var(--border);}
  table.tbl tr:hover td{background:#faf8f3;}
  .modal-bg{background:rgba(30,20,15,.55); backdrop-filter:blur(2px);}
  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-thumb{background:#d8cfbe; border-radius:8px;}
  input[type=text], input[type=number], input[type=date], input[type=month], input[type=password], select{
    border:1px solid var(--border); border-radius:9px; padding:8px 10px; width:100%; font-size:14px; transition:border-color .15s ease, box-shadow .15s ease; background:#fff;
  }
  input:focus, select:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(161,72,58,.14);}
  label.lbl{font-size:12px; font-weight:600; color:var(--muted); display:block; margin-bottom:4px;}
  .logo-img{width:40px; height:44px; object-fit:contain; border-radius:9px; background:#fff; padding:3px; box-shadow:var(--shadow-sm);}
  .safe-top{padding-top:env(safe-area-inset-top);}
  .safe-bottom{padding-bottom:env(safe-area-inset-bottom);}
  .kpi-card{position:relative; overflow:hidden;}
  .kpi-card::before{content:'';position:absolute; top:0; left:0; right:0; height:3px; background:var(--kpi-color, transparent);}

  /* ---------- Animaciones ---------- */
  @keyframes fadeSlideIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
  @keyframes fadeScaleIn{ from{opacity:0; transform:scale(.95);} to{opacity:1; transform:scale(1);} }
  @keyframes popIn{ 0%{opacity:0; transform:scale(.92);} 65%{opacity:1; transform:scale(1.015);} 100%{opacity:1; transform:scale(1);} }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  @keyframes slideDownFade{ from{opacity:0; transform:translateY(-10px);} to{opacity:1; transform:translateY(0);} }
  @keyframes gradientDrift{ 0%,100%{background-position:0% 30%;} 50%{background-position:100% 70%;} }
  @keyframes checkPulse{ 0%{transform:scale(.9); opacity:.6;} 60%{transform:scale(1.08);} 100%{transform:scale(1); opacity:1;} }

  .anim-fade-slide{ animation:fadeSlideIn .35s cubic-bezier(.16,1,.3,1) both; }
  .anim-fade-scale{ animation:fadeScaleIn .2s ease both; }
  .anim-pop{ animation:popIn .28s cubic-bezier(.16,1,.3,1) both; }
  .anim-fade{ animation:fadeIn .2s ease both; }
  .anim-slide-down{ animation:slideDownFade .3s cubic-bezier(.16,1,.3,1) both; }
  .anim-check{ animation:checkPulse .35s cubic-bezier(.34,1.56,.64,1) both; }
  .stagger-1{ animation-delay:.04s; } .stagger-2{ animation-delay:.09s; }
  .stagger-3{ animation-delay:.14s; } .stagger-4{ animation-delay:.19s; }
  .login-hero{ background-size:180% 180%; animation:gradientDrift 10s ease-in-out infinite; }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
  @media (max-width:767px){
    table.tbl{font-size:12px;}
    table.tbl td, table.tbl th{padding:8px 10px;}
  }
</style>
</head>
<body class="h-screen w-screen overflow-hidden">
<div id="app" class="h-full w-full"></div>
<script src="config.js"></script>
<script src="logo.js"></script>
<script>
  // Favicon a prueba de fallos: lo arma con el logo ya embebido en logo.js,
  // así funciona aunque la carpeta icons/ no se haya subido al repositorio.
  if (window.LOGO_DATA_URL) {
    let link = document.querySelector("link[rel~='icon']");
    if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
    link.type = 'image/png';
    link.href = window.LOGO_DATA_URL;
  }
</script>
<script src="app.js"></script>
<script>
  // Registro del service worker (necesario para que la app sea instalable).
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {
        // Si falla (ej. abierto como file:// en vez de https://), la app sigue
        // funcionando normal, solo sin la opción de instalar.
      });
    });
  }
</script>
</body>
</html>
